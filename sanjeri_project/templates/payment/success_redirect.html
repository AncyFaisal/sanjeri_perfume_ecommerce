<!-- templates/payment/success_redirect.html -->
{% extends 'base.html' %}

{% block title %}Payment Successful - Sanjeri{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card shadow-lg border-0">
                <div class="card-body p-5">
                    <div class="mb-4">
                        <div class="success-icon" style="width: 100px; height: 100px; margin: 0 auto; background: #d4edda; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                            <i class="fas fa-check fa-3x text-success"></i>
                        </div>
                    </div>
                    
                    <h2 class="mb-3">Payment Successful!</h2>
                    <p class="text-muted mb-4">Your payment has been processed successfully. Redirecting to order details...</p>
                    
                    <div class="spinner-border text-success mb-4" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    
                    <div class="mt-4">
                        <p class="text-muted small">
                            If you are not redirected automatically, 
                            <a href="{{ redirect_url }}">click here</a>.
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Redirect after 3 seconds
    setTimeout(function() {
        window.location.href = "{{ redirect_url }}";
    }, 3000);
</script>
{% endblock %}
