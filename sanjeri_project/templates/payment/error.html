<!-- templates/payment/error.html -->
{% extends 'base.html' %}

{% block title %}Payment Error - Sanjeri{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div class="mb-4">
                <i class="fas fa-times-circle text-danger" style="font-size: 5rem;"></i>
            </div>
            
            <h1 class="display-5 text-danger mb-3">Payment Error</h1>
            <p class="lead mb-4">{{ error|default:"An error occurred during payment processing." }}</p>
            
            <div class="d-grid gap-3 d-md-flex justify-content-center mt-4">
                <a href="{% url 'homepage' %}" class="btn btn-primary btn-lg">
                    <i class="fas fa-home me-2"></i>Return to Home
                </a>
                <a href="{% url 'order_list' %}" class="btn btn-outline-secondary btn-lg ms-md-3">
                    <i class="fas fa-shopping-bag me-2"></i>View Orders
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
